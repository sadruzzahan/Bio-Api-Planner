openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Biological API — programmable optimization interface for human biology
servers:
  - url: /api
    description: Base API path
security:
  - ClerkSession: []
tags:
  - name: health
  - name: users
  - name: biometrics
  - name: sleep
  - name: glucose
  - name: activity
  - name: state
  - name: interventions
  - name: meals
  - name: supplements
  - name: integrations
  - name: dashboard
  - name: insights
  - name: chat
  - name: privacy
  - name: consent

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [ health ]
      summary: Health check
      security: []
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /consent:
    get:
      operationId: listConsent
      tags: [ consent ]
      summary: List the current user's consent records
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListConsentResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
    post:
      operationId: recordConsent
      tags: [ consent ]
      summary: Record acceptance (or revocation) of a legal document
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateConsentBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConsentRecord"
        "400":
          description: Bad request
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /audit/log:
    get:
      operationId: listAuditLog
      tags: [ privacy ]
      summary: Recent audit-log entries for the current user
      parameters:
        - in: query
          name: limit
          schema: { type: integer, default: 100, maximum: 200 }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListAuditLogResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /users/me/export:
    get:
      operationId: exportMyData
      tags: [ privacy ]
      summary: Download a JSON archive of all data owned by the current user
      responses:
        "200":
          description: A downloadable JSON archive
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /users/me:
    delete:
      operationId: deleteCurrentUser
      tags: [ privacy ]
      summary: Soft-delete the current user account (purge after 30 days)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DeleteAccountBody"
      responses:
        "202":
          description: Deletion scheduled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteAccountResponse"
        "400":
          description: Bad request
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
    get:
      operationId: getCurrentUser
      tags: [ users ]
      summary: Get current user profile
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
    patch:
      operationId: updateCurrentUser
      tags: [ users ]
      summary: Update current user profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUserBody"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /biometrics:
    get:
      operationId: listBiometrics
      tags: [ biometrics ]
      summary: List biometric readings
      parameters:
        - in: query
          name: metric
          schema: { type: string }
        - in: query
          name: source
          schema: { type: string }
        - in: query
          name: from
          schema: { type: string, format: date-time }
        - in: query
          name: to
          schema: { type: string, format: date-time }
        - in: query
          name: limit
          schema: { type: integer, default: 200, maximum: 1000 }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BiometricReading"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
    post:
      operationId: createBiometric
      tags: [ biometrics ]
      summary: Create a manual biometric reading
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBiometricBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BiometricReading"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /biometrics/summary:
    get:
      operationId: getBiometricsSummary
      tags: [ biometrics ]
      summary: 7-day and 30-day aggregate per metric
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BiometricSummary"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /sleep:
    get:
      operationId: listSleep
      tags: [ sleep ]
      summary: List sleep sessions
      parameters:
        - in: query
          name: from
          schema: { type: string, format: date }
        - in: query
          name: to
          schema: { type: string, format: date }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SleepSession"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /sleep/trend:
    get:
      operationId: getSleepTrend
      tags: [ sleep ]
      summary: 30-day sleep trend
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SleepTrend"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /glucose:
    get:
      operationId: listGlucose
      tags: [ glucose ]
      summary: List glucose readings
      parameters:
        - in: query
          name: from
          schema: { type: string, format: date-time }
        - in: query
          name: to
          schema: { type: string, format: date-time }
        - in: query
          name: mealContext
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/GlucoseReading"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /glucose/trend:
    get:
      operationId: getGlucoseTrend
      tags: [ glucose ]
      summary: Glucose trend (daily averages, variability)
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GlucoseTrend"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /activity:
    get:
      operationId: listActivity
      tags: [ activity ]
      summary: List activity sessions
      parameters:
        - in: query
          name: from
          schema: { type: string, format: date-time }
        - in: query
          name: to
          schema: { type: string, format: date-time }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ActivitySession"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /state/current:
    get:
      operationId: getCurrentState
      tags: [ state ]
      summary: Current biological state classification
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BiologicalState"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /state/history:
    get:
      operationId: getStateHistory
      tags: [ state ]
      summary: Biological state history
      parameters:
        - in: query
          name: from
          schema: { type: string, format: date-time }
        - in: query
          name: to
          schema: { type: string, format: date-time }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BiologicalState"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /interventions:
    get:
      operationId: listInterventions
      tags: [ interventions ]
      summary: List interventions
      parameters:
        - in: query
          name: status
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Intervention"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /interventions/{id}:
    patch:
      operationId: updateIntervention
      tags: [ interventions ]
      summary: Update intervention status
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateInterventionBody"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Intervention"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /meals:
    get:
      operationId: listMeals
      tags: [ meals ]
      summary: List meal log
      parameters:
        - in: query
          name: from
          schema: { type: string, format: date-time }
        - in: query
          name: to
          schema: { type: string, format: date-time }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Meal"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
    post:
      operationId: createMeal
      tags: [ meals ]
      summary: Log a meal
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateMealBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Meal"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /supplements:
    get:
      operationId: listSupplements
      tags: [ supplements ]
      summary: Supplement stack
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Supplement"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
    post:
      operationId: createSupplement
      tags: [ supplements ]
      summary: Add a supplement
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSupplementBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Supplement"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /supplements/{id}:
    patch:
      operationId: updateSupplement
      tags: [ supplements ]
      summary: Update a supplement
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateSupplementBody"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Supplement"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
    delete:
      operationId: deleteSupplement
      tags: [ supplements ]
      summary: Remove a supplement
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "204":
          description: Deleted
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /integrations:
    get:
      operationId: listIntegrations
      tags: [ integrations ]
      summary: List integrations
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Integration"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /integrations/{provider}/connect:
    post:
      operationId: connectIntegration
      tags: [ integrations ]
      summary: Initiate or simulate a connection
      parameters:
        - in: path
          name: provider
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Integration"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /integrations/{provider}:
    delete:
      operationId: disconnectIntegration
      tags: [ integrations ]
      summary: Disconnect an integration
      parameters:
        - in: path
          name: provider
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Integration"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /dashboard:
    get:
      operationId: getDashboard
      tags: [ dashboard ]
      summary: Composite dashboard payload
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Dashboard"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /insights:
    get:
      operationId: getInsights
      tags: [ insights ]
      summary: AI insight cards
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Insight"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /chat:
    post:
      operationId: sendChatMessage
      tags: [ chat ]
      summary: Send a chat message and get AI response
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendChatBody"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /chat/history:
    get:
      operationId: getChatHistory
      tags: [ chat ]
      summary: Recent chat messages
      parameters:
        - in: query
          name: limit
          schema: { type: integer, default: 50, maximum: 200 }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ChatMessage"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

components:
  securitySchemes:
    ClerkSession:
      type: apiKey
      in: cookie
      name: __session
      description: Clerk session cookie set by the Clerk frontend SDK after sign-in.
  responses:
    Unauthorized:
      description: Missing or invalid authentication
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorBody"
    Forbidden:
      description: Authenticated user is not allowed to perform this action
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorBody"
  schemas:
    ErrorBody:
      type: object
      properties:
        error: { type: string }
      required: [ error ]
    HealthStatus:
      type: object
      properties:
        status: { type: string }
      required: [ status ]

    User:
      type: object
      properties:
        id: { type: integer }
        email: { type: string }
        name: { type: string }
        role: { type: string }
        tier: { type: string }
        chronotype: { type: string }
        primaryGoal: { type: string }
        onboardedAt: { type: string, format: date-time, nullable: true }
        createdAt: { type: string, format: date-time }
      required: [ id, email, name, role, tier, chronotype, primaryGoal, createdAt ]

    UpdateUserBody:
      type: object
      properties:
        name: { type: string }
        chronotype: { type: string }
        primaryGoal: { type: string }
        onboardedAt: { type: string, format: date-time, nullable: true }

    ConsentRecord:
      type: object
      properties:
        id: { type: integer }
        userId: { type: integer }
        document: { type: string }
        version: { type: string }
        accepted: { type: boolean }
        categories: { type: object, additionalProperties: true, nullable: true }
        ip: { type: string, nullable: true }
        userAgent: { type: string, nullable: true }
        acceptedAt: { type: string, format: date-time }
      required: [ id, userId, document, version, accepted, acceptedAt ]

    ListConsentResponse:
      type: object
      properties:
        records:
          type: array
          items: { $ref: "#/components/schemas/ConsentRecord" }
      required: [ records ]

    CreateConsentBody:
      type: object
      properties:
        document:
          type: string
          enum: [ tos, privacy, disclaimer, cookies ]
        version: { type: string }
        accepted: { type: boolean }
        categories: { type: object, additionalProperties: true, nullable: true }
      required: [ document, version ]

    AuditLogEntry:
      type: object
      properties:
        id: { type: integer }
        userId: { type: integer, nullable: true }
        actorId: { type: integer, nullable: true }
        action: { type: string }
        entity: { type: string }
        entityId: { type: string, nullable: true }
        metadata: { type: object, additionalProperties: true, nullable: true }
        ip: { type: string, nullable: true }
        userAgent: { type: string, nullable: true }
        createdAt: { type: string, format: date-time }
      required: [ id, action, entity, createdAt ]

    ListAuditLogResponse:
      type: object
      properties:
        entries:
          type: array
          items: { $ref: "#/components/schemas/AuditLogEntry" }
      required: [ entries ]

    DeleteAccountBody:
      type: object
      properties:
        confirmEmail: { type: string }
      required: [ confirmEmail ]

    DeleteAccountResponse:
      type: object
      properties:
        deletedAt: { type: string, format: date-time }
        purgeAfter: { type: string, format: date-time }
      required: [ deletedAt, purgeAfter ]

    BiometricReading:
      type: object
      properties:
        id: { type: integer }
        userId: { type: integer }
        source: { type: string }
        metric: { type: string }
        value: { type: number }
        unit: { type: string }
        recordedAt: { type: string, format: date-time }
      required: [ id, userId, source, metric, value, unit, recordedAt ]

    CreateBiometricBody:
      type: object
      properties:
        source: { type: string }
        metric: { type: string }
        value: { type: number }
        unit: { type: string }
        recordedAt: { type: string, format: date-time }
      required: [ source, metric, value, unit, recordedAt ]

    BiometricSummary:
      type: object
      properties:
        metric: { type: string }
        unit: { type: string }
        last24hAvg: { type: number, nullable: true }
        sevenDayAvg: { type: number, nullable: true }
        thirtyDayAvg: { type: number, nullable: true }
        sevenDayMin: { type: number, nullable: true }
        sevenDayMax: { type: number, nullable: true }
        trendPct: { type: number, nullable: true }
        latest: { type: number, nullable: true }
        latestAt: { type: string, format: date-time, nullable: true }
      required: [ metric, unit ]

    SleepSession:
      type: object
      properties:
        id: { type: integer }
        userId: { type: integer }
        source: { type: string }
        date: { type: string, format: date }
        totalMinutes: { type: integer }
        deepMinutes: { type: integer }
        remMinutes: { type: integer }
        lightMinutes: { type: integer }
        awakeMinutes: { type: integer }
        efficiencyPct: { type: number }
        onsetAt: { type: string, format: date-time }
        wakeAt: { type: string, format: date-time }
      required:
        [
          id,
          userId,
          source,
          date,
          totalMinutes,
          deepMinutes,
          remMinutes,
          lightMinutes,
          awakeMinutes,
          efficiencyPct,
          onsetAt,
          wakeAt
        ]

    SleepTrendPoint:
      type: object
      properties:
        date: { type: string, format: date }
        totalMinutes: { type: integer }
        deepMinutes: { type: integer }
        remMinutes: { type: integer }
        lightMinutes: { type: integer }
        efficiencyPct: { type: number }
      required:
        [
          date,
          totalMinutes,
          deepMinutes,
          remMinutes,
          lightMinutes,
          efficiencyPct
        ]

    SleepTrend:
      type: object
      properties:
        avgTotalMinutes: { type: number }
        avgEfficiencyPct: { type: number }
        avgDeepMinutes: { type: number }
        avgRemMinutes: { type: number }
        sleepDebtMinutes: { type: number }
        points:
          type: array
          items: { $ref: "#/components/schemas/SleepTrendPoint" }
      required:
        [
          avgTotalMinutes,
          avgEfficiencyPct,
          avgDeepMinutes,
          avgRemMinutes,
          sleepDebtMinutes,
          points
        ]

    GlucoseReading:
      type: object
      properties:
        id: { type: integer }
        userId: { type: integer }
        source: { type: string }
        valueMgdl: { type: number }
        mealContext: { type: string }
        recordedAt: { type: string, format: date-time }
      required: [ id, userId, source, valueMgdl, mealContext, recordedAt ]

    GlucoseTrendPoint:
      type: object
      properties:
        date: { type: string, format: date }
        avgMgdl: { type: number }
        minMgdl: { type: number }
